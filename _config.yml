---
# Site configuration for the Jekyll‑powered personal website.
# These variables are referenced throughout the templates to
# centralise your site settings.

# Basic information
title: "Aryan Pandey"
email: "me@aryanpan.de"
author: "Aryan Pandey"
description: >-
  Aryan Pandey — neuromorphic computing PhD at the University at Buffalo,
  and a nature photographer. Brain-inspired hardware, spiking neural
  networks, and quiet rainy forests, behind a rainy window.

# URL settings. Leave baseurl blank when deploying to the root of a GitHub Pages site.
baseurl: ""
url: "https://aryanpan.de"

# Build settings
markdown: kramdown
permalink: pretty
timezone: America/New_York

# Collections
collections:
  posts:
    output: true

# Defaults for posts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: "Aryan"
      comments: false

# Plugins (none by default; can be extended later)
plugins: []

# Keep dev/prototype files out of the published build
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - CMS-SETUP.md

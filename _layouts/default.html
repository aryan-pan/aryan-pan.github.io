<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>{{ page.title | default: site.title }}{% if page.title and page.title != site.title %} · {{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_newlines }}"/>

  <link rel="canonical" href="{{ page.url | absolute_url }}"/>
  <meta property="og:title" content="{{ page.title | default: site.title }}"/>
  <meta property="og:description" content="{{ page.description | default: site.description | strip_newlines }}"/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="{{ page.url | absolute_url }}"/>
  <meta property="og:image" content="{{ '/assets/images/backgrounds/city_night.jpg' | absolute_url }}"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="theme-color" content="#0c0f0e"/>

  <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="{{ '/assets/favicon.svg' | relative_url }}"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Newsreader:ital,wght@1,400;1,500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}"/>
</head>
<body>
  <a class="skip-link" href="#content">Skip to content</a>

  <!-- rainy-glass backdrop (WebGL) -->
  <canvas id="rain-canvas" aria-hidden="true"
    data-bg="{{ '/assets/images/foggy_forest.jpg' | relative_url }}"
    data-scenes='[
      {"name":"Forest","icon":"forest","src":"{{ '/assets/images/foggy_forest.jpg' | relative_url }}","fog":0.33,"blur":3.3,"refr":0.10},
      {"name":"City","icon":"city","src":"{{ '/assets/images/backgrounds/city_night.jpg' | relative_url }}","fog":0.22,"blur":2.6,"refr":0.12},
      {"name":"Mountains","icon":"mountains","src":"{{ '/assets/images/backgrounds/mountains.jpg' | relative_url }}","fog":0.30,"blur":3.0,"refr":0.10},
      {"name":"Aurora","icon":"aurora","src":"{{ '/assets/images/backgrounds/aurora.jpg' | relative_url }}","fog":0.18,"blur":2.4,"refr":0.11}
    ]'></canvas>
  <div class="backdrop-scrim" aria-hidden="true"></div>

  <header class="site-header">
    <nav class="nav glass" aria-label="Primary">
      <a class="brand" href="{{ '/' | relative_url }}">Aryan&nbsp;Pandey</a>
      <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="nav-links">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
      </button>
      <div class="nav-links" id="nav-links">
        <a href="{{ '/#about' | relative_url }}">About</a>
        <a href="{{ '/#research' | relative_url }}">Research</a>
        <a href="{{ '/#experience' | relative_url }}">Experience</a>
        <a href="{{ '/#photography' | relative_url }}">Photography</a>
        <a href="{{ '/blog/' | relative_url }}">Writing</a>
        <a class="btn" href="{{ '/assets/resume.pdf' | relative_url }}" target="_blank" rel="noopener">Résumé</a>
      </div>
    </nav>
  </header>

  <main id="content">
    {{ content }}
  </main>

  <footer class="site-footer" id="contact">
    <div class="wrap reveal">
      <h2>Contact</h2>
      <p class="lead" style="margin-inline:auto;">Reach me by email, or find me on the links below.</p>
      <div class="socials">
        <a class="social glass" href="mailto:{{ site.email | default: 'me@aryanpan.de' }}" aria-label="Email" title="Email">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
        </a>
        <a class="social glass" href="https://github.com/aryan-pan" target="_blank" rel="noopener" aria-label="GitHub" title="GitHub">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5A11.5 11.5 0 0 0 .5 12a11.5 11.5 0 0 0 7.86 10.92c.58.1.79-.25.79-.56v-2c-3.2.7-3.88-1.36-3.88-1.36-.53-1.34-1.3-1.7-1.3-1.7-1.06-.72.08-.7.08-.7 1.17.08 1.78 1.2 1.78 1.2 1.04 1.78 2.73 1.27 3.4.97.1-.75.4-1.27.73-1.56-2.56-.29-5.26-1.28-5.26-5.7 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11 11 0 0 1 5.8 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.84 1.19 3.1 0 4.43-2.7 5.4-5.28 5.69.42.36.79 1.07.79 2.16v3.2c0 .31.21.67.8.56A11.5 11.5 0 0 0 23.5 12 11.5 11.5 0 0 0 12 .5Z"/></svg>
        </a>
        <a class="social glass" href="https://www.linkedin.com/in/aryanpan" target="_blank" rel="noopener" aria-label="LinkedIn" title="LinkedIn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M4.98 3.5A2.5 2.5 0 1 1 5 8.5a2.5 2.5 0 0 1-.02-5zM3 9h4v12H3zM9 9h3.8v1.64h.05c.53-1 1.83-2.06 3.76-2.06 4.02 0 4.76 2.65 4.76 6.1V21h-4v-5.4c0-1.29-.02-2.95-1.8-2.95-1.8 0-2.07 1.4-2.07 2.85V21H9z"/></svg>
        </a>
      </div>
      <p class="copyright">© {{ site.time | date: '%Y' }} Aryan Pandey</p>
    </div>
  </footer>

  <script src="{{ '/assets/js/rain.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
</body>
</html>
